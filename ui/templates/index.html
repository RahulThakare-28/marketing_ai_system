
<!DOCTYPE html>
<html>
<head>
    <title>Marketing AI System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4">Target Customer Finder</h2>

<form method="POST" class="mb-4">

    <div class="mb-3">
        <label>Product Name</label>
        <input type="text" name="product_name" class="form-control">
    </div>

    <div class="mb-3">
        <label>Category</label>
        <input type="text" name="category" class="form-control">
    </div>

    <div class="mb-3">
        <label>Brand</label>
        <input type="text" name="brand" class="form-control">
    </div>

    <button class="btn btn-primary">Find Customers</button>

</form>

{% if result %}
<h3>Top Target Customers</h3>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>User ID</th>
            <th>Probability</th>
        </tr>
    </thead>

    <tbody>
        {% for row in result %}
        <tr>
            <td>{{ row.user_id }}</td>
            <td>{{ "%.2f"|format(row.probability) }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
